name: Deploy guide to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build site (pure Python, zero deps)
        run: |
          python3 src/build.py
          python3 src/build_print.py

      - name: Validate (structural + links)
        run: |
          python3 src/check_html.py
          python3 src/check_links.py

      - name: Assemble _site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r lessons _site/
          cp print_zh.html print_en.html _site/
          # Skip Jekyll so files/dirs are served verbatim.
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
